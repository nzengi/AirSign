# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []

# ── Advisories ──────────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []

# ── Licenses ────────────────────────────────────────────────────────────
[licenses]
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",
    "Zlib",
]
copyleft = "warn"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

# ── Bans ────────────────────────────────────────────────────────────────
[bans]
# Deny multiple versions of the same crate (helps spot duplicate deps)
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# Crates that must never be included in the dependency graph
deny = [
    # old openssl bindings — we use ring/rustls only
    { name = "openssl" },
    { name = "openssl-sys" },
    # avoid git2 (large C dep)
    { name = "git2" },
]

# ── Sources ─────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []