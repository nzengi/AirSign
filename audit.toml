# cargo-audit configuration for AirSign.
#
# We list every advisory we explicitly accept along with the rationale.
# CI runs `cargo audit` and FAILS on anything that's not in this list, so
# adding an entry here is a deliberate, reviewable act — not a blanket suppression.
#
# Re-audit policy:
#   - Each ignored advisory MUST cite a reason.
#   - We re-check this list on every solana-sdk version bump and remove
#     entries whose upstream fix has reached the dep graph.
#   - This file is committed to the repo; reviewers can see the diff.

[advisories]

ignore = [
    # ─── solana-sdk transitive dependencies ─────────────────────────────────
    #
    # All five entries below come transitively through `solana-keypair` →
    # `solana-client` (in solana-sdk 2.x). They do NOT affect:
    #   • the WASM browser bundle (which does not link solana-sdk at all),
    #   • the cryptographic core crates (afterimage-core / -frost / -dkg use
    #     ed25519-dalek v2 / curve25519-dalek v4 directly),
    #   • AirSign's signing hot path (uses the v2 SigningKey, not the v1
    #     legacy crate that solana-keypair pulls for BIP-32 compat).
    #
    # The vulnerable code is reached only by the native CLI's RPC client when
    # talking to Solana RPC over WSS. On the air-gapped device we never
    # construct such a client (zero network), so the attack surface is
    # null on the path we care about. We accept them transparently and
    # remove these entries when the upstream solana-sdk bump lands.

    "RUSTSEC-2022-0093",  # ed25519-dalek 1.0.1 — Double Public Key Signing
                          # Function Oracle Attack.
                          # Path: solana-keypair → ed25519-dalek-bip32 → ed25519-dalek 1.0.1.
                          # AirSign signs via ed25519-dalek 2.x; v1 is dead code.

    "RUSTSEC-2024-0344",  # curve25519-dalek 3.2.0 — timing variability in
                          # Scalar29::sub / Scalar52::sub.
                          # Pulled in only by ed25519-dalek 1.0.1 (above).
                          # Our crypto path uses curve25519-dalek 4.1.3.

    "RUSTSEC-2026-0098",  # rustls-webpki 0.101.7 — name constraints for URI
                          # names incorrectly accepted.
    "RUSTSEC-2026-0099",  # rustls-webpki 0.101.7 — name constraints accepted
                          # for certificates asserting a wildcard name.
    "RUSTSEC-2026-0104",  # rustls-webpki 0.101.7 — reachable panic in CRL
                          # parsing.
                          # All three: pulled in by tokio-tungstenite WSS → solana-pubsub-client.
                          # AirSign's air-gapped device has zero network, so it never
                          # establishes a WSS connection.  Native CLI RPC is HTTPS via
                          # reqwest, which uses rustls-webpki 0.103.13 (patched).
]

# Empty `informational_warnings` means we DO want unmaintained-crate warnings
# to surface in CI logs — but they don't fail the build the way `vulnerability`
# advisories do (`cargo audit` only exits non-zero on unignored vulnerabilities).
informational_warnings = []
