<!DOCTYPE html>
<!--
  airsign_bridge.html — Headless WASM bridge for AirSign mobile (v2.1)

  v2.1 changes vs v2:
  · generateKeypair now pushes the secret key to the native secure store
    automatically via saveSecretToNative() BEFORE resolving the Promise.
    The secret never appears in the Promise result — only {id, pubkeyHex,
    pubkeyBase58} is returned to the RN layer.
  · restoreKeypairs(callId, keysJson) — called by native on bridge-ready so
    all previously generated keypairs are warmed into the WASM memory cache.
    This means signTransaction / signMessage never need an extra loadKeypair
    round-trip after the first app restart.
-->
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AirSign Bridge</title>
</head>
<body style="display:none;margin:0;padding:0;">
<script type="module">
// ─── Load WASM ───────────────────────────────────────────────────────────────
import init, {
  WasmKeypair,
  WasmSendSession,
  WasmRecvSession,
} from "./wasm/afterimage_wasm.js";

// ─── Platform: send result / error back to native ────────────────────────────

function sendResult(callId, result) {
  const payload = JSON.stringify({ callId, ok: true, result });
  if (window.webkit?.messageHandlers?.airSignResult) {
    window.webkit.messageHandlers.airSignResult.postMessage(payload);
  } else if (window.AirSignBridge) {
    window.AirSignBridge.postResult(callId, payload);
  }
}

function sendError(callId, message) {
  const payload = JSON.stringify({ callId, ok: false, error: String(message) });
  if (window.webkit?.messageHandlers?.airSignResult) {
    window.webkit.messageHandlers.airSignResult.postMessage(payload);
  } else if (window.AirSignBridge) {
    window.AirSignBridge.postResult(callId, payload);
  }
}

// ─── Platform: persist secret key to native secure store ─────────────────────
//
// Called INSIDE generateKeypair before sendResult() so the secret is always
// stored before the Promise resolves.  The secret never reaches the RN layer.
//
// iOS  → WKScriptMessageHandler "airSignSaveSecret"  body: JSON {id, secretHex}
// Android → AirSignBridge.saveSecret(id, secretHex)  @JavascriptInterface
//
function saveSecretToNative(id, secretHex) {
  const body = JSON.stringify({ id, secretHex });
  if (window.webkit?.messageHandlers?.airSignSaveSecret) {
    window.webkit.messageHandlers.airSignSaveSecret.postMessage(body);
  } else if (window.AirSignBridge) {
    window.AirSignBridge.saveSecret(id, secretHex);
  }
}

// ─── Fountain decoder session registry ───────────────────────────────────────
const recvSessions = new Map();

// ─── In-memory keypair store ──────────────────────────────────────────────────
// Warmed on startup by restoreKeypairs() and updated by generateKeypair().
// Maps id → secretKeyHex string.
const keypairs = new Map();

// ─── AirSign API ──────────────────────────────────────────────────────────────
window.AirSign = {

  // ── Key management ──────────────────────────────────────────────────────────

  /**
   * Generate a new Ed25519 keypair.
   *
   * Flow:
   *   1. WASM generates keypair entirely inside linear memory.
   *   2. secret hex pushed to native Keychain/Keystore via saveSecretToNative.
   *   3. Keypair cached in this page's memory Map.
   *   4. { id, pubkeyHex, pubkeyBase58 } sent back — secret NOT included.
   */
  async generateKeypair(callId) {
    try {
      const kp         = new WasmKeypair();
      const id         = kp.id();
      const secretHex  = kp.secret_key_hex();
      const pubkeyHex  = kp.public_key_hex();
      const pubkeyB58  = kp.public_key_base58();
      kp.free();

      // Persist to native BEFORE resolving.
      saveSecretToNative(id, secretHex);

      // Warm memory cache.
      keypairs.set(id, secretHex);

      sendResult(callId, { id, pubkeyHex, pubkeyBase58: pubkeyB58 });
    } catch(e) { sendError(callId, e); }
  },

  /**
   * Bulk-restore keypairs from native secure store into the WASM memory cache.
   * Called by the native layer immediately after bridgeDidBecomeReady.
   *
   * @param keysJson  JSON array: [{ id: string, secretHex: string }, …]
   */
  async restoreKeypairs(callId, keysJson) {
    try {
      const keys = JSON.parse(keysJson);
      for (const { id, secretHex } of keys) {
        keypairs.set(id, secretHex);
      }
      sendResult(callId, { restored: keys.length });
    } catch(e) { sendError(callId, e); }
  },

  /**
   * Load a single keypair from its secret hex (used for lazy on-demand load
   * when the cache is cold for a specific id).
   */
  async loadKeypair(callId, id, secretKeyHex) {
    try {
      const kp = WasmKeypair.from_secret_hex(secretKeyHex);
      keypairs.set(id, secretKeyHex);
      sendResult(callId, {
        id,
        pubkeyHex:    kp.public_key_hex(),
        pubkeyBase58: kp.public_key_base58(),
      });
      kp.free();
    } catch(e) { sendError(callId, e); }
  },

  /** Evict a keypair from the memory cache. */
  async deleteKeypair(callId, id) {
    keypairs.delete(id);
    sendResult(callId, null);
  },

  // ── Signing ─────────────────────────────────────────────────────────────────

  /**
   * Sign a Solana transaction (base64-encoded wire format).
   * Requires the keypair to be in the memory cache (either warmed on startup
   * by restoreKeypairs or lazily loaded by the native ensureLoaded helper).
   * Returns { signatureHex, signatureBase58 }.
   */
  async signTransaction(callId, id, txBase64) {
    try {
      const secretHex = keypairs.get(id);
      if (!secretHex) throw new Error(`Keypair ${id} not in cache`);
      const kp  = WasmKeypair.from_secret_hex(secretHex);
      const sig = kp.sign_transaction_base64(txBase64);
      sendResult(callId, {
        signatureHex:    sig.hex(),
        signatureBase58: sig.base58(),
      });
      kp.free(); sig.free();
    } catch(e) { sendError(callId, e); }
  },

  /**
   * Sign an arbitrary message (base64-encoded bytes).
   * Returns { signatureHex, signatureBase58 }.
   */
  async signMessage(callId, id, messageBase64) {
    try {
      const secretHex = keypairs.get(id);
      if (!secretHex) throw new Error(`Keypair ${id} not in cache`);
      const kp  = WasmKeypair.from_secret_hex(secretHex);
      const sig = kp.sign_message_base64(messageBase64);
      sendResult(callId, {
        signatureHex:    sig.hex(),
        signatureBase58: sig.base58(),
      });
      kp.free(); sig.free();
    } catch(e) { sendError(callId, e); }
  },

  // ── Transaction inspection ────────────────────────────────────────────────────

  async inspectTransaction(callId, txBase64) {
    try {
      const result = JSON.parse(inspectTransactionJson(txBase64));
      sendResult(callId, result);
    } catch(e) { sendError(callId, e); }
  },

  // ── Fountain encode/decode ────────────────────────────────────────────────────

  async fountainEncode(callId, payloadBase64, targetFrames) {
    try {
      const bytes   = Uint8Array.from(atob(payloadBase64), c => c.charCodeAt(0));
      const session = new WasmSendSession(bytes, "", "");
      const frames  = [];
      let count = 0;
      while (session.has_next() && count < targetFrames) {
        const frame = session.next_frame();
        frames.push(btoa(String.fromCharCode(...frame)));
        count++;
      }
      sendResult(callId, { frames, totalFrames: count });
      session.free();
    } catch(e) { sendError(callId, e); }
  },

  async fountainDecodeAdd(callId, sessionId, frameBase64, totalBlocks) {
    try {
      if (!recvSessions.has(sessionId)) {
        recvSessions.set(sessionId, new WasmRecvSession(""));
      }
      const session = recvSessions.get(sessionId);
      const bytes   = Uint8Array.from(atob(frameBase64), c => c.charCodeAt(0));
      session.ingest_frame(bytes);
      if (session.is_complete()) {
        const data    = session.get_data();
        const payload = btoa(String.fromCharCode(...data));
        recvSessions.delete(sessionId);
        session.free();
        sendResult(callId, { complete: true, payload });
      } else {
        sendResult(callId, { complete: false });
      }
    } catch(e) { sendError(callId, e); }
  },

  async fountainDecodeReset(callId, sessionId) {
    const session = recvSessions.get(sessionId);
    if (session) { session.free(); recvSessions.delete(sessionId); }
    sendResult(callId, null);
  },
};

// ─── Initialise WASM ─────────────────────────────────────────────────────────
(async () => {
  try {
    await init("./wasm/afterimage_wasm_bg.wasm");
    // Signal ready — native will immediately call restoreKeypairs().
    if (window.webkit?.messageHandlers?.airSignReady) {
      window.webkit.messageHandlers.airSignReady.postMessage("ready");
    } else if (window.AirSignBridge) {
      window.AirSignBridge.onReady();
    }
  } catch(e) {
    console.error("[AirSign bridge] WASM init failed:", e);
  }
})();
</script>
</body>
</html>
