name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: fmt + clippy + test ──────────────────────────────────────────
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: >
          cargo clippy
          --workspace
          --exclude afterimage-wasm
          --all-targets
          --all-features
          -- -D warnings

      - name: cargo test
        run: >
          cargo test
          --workspace
          --exclude afterimage-wasm
          --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet

      - name: cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --quiet

      - name: cargo deny check
        run: cargo deny check

  # ── WASM build ─────────────────────────────────────────────────────────
  wasm:
    name: WASM (wasm-pack build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: wasm-pack build
        run: wasm-pack build crates/afterimage-wasm --target web

      - name: Upload WASM pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: afterimage-wasm-pkg
          path: crates/afterimage-wasm/pkg/
          retention-days: 7

  # ── React SDK: install + test + build ──────────────────────────────────
  react:
    name: React SDK (test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/react/package-lock.json

      - name: npm ci
        working-directory: packages/react
        run: npm ci

      - name: npm test (vitest)
        working-directory: packages/react
        run: npm test

      - name: npm run build (tsup)
        working-directory: packages/react
        run: npm run build

  # ── Demo app: install + build ──────────────────────────────────────────
  demo:
    name: Demo app (build)
    runs-on: ubuntu-latest
    needs: [wasm]            # needs the WASM pkg to copy into public/wasm/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/signer-web/package-lock.json

      - name: Download WASM pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: afterimage-wasm-pkg
          path: crates/afterimage-wasm/pkg

      - name: Copy WASM into demo public dir
        run: |
          mkdir -p apps/signer-web/public/wasm
          cp crates/afterimage-wasm/pkg/afterimage_wasm_bg.wasm apps/signer-web/public/wasm/
          cp crates/afterimage-wasm/pkg/afterimage_wasm.js      apps/signer-web/public/wasm/
          cp crates/afterimage-wasm/pkg/afterimage_wasm.d.ts    apps/signer-web/public/wasm/
          cp crates/afterimage-wasm/pkg/afterimage_wasm_bg.wasm.d.ts apps/signer-web/public/wasm/

      - name: npm ci
        working-directory: apps/signer-web
        run: npm ci

      - name: npm run build (vite)
        working-directory: apps/signer-web
        run: npm run build

      - name: Upload demo dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: signer-web-dist
          path: apps/signer-web/dist/
          retention-days: 7

  # ── GitHub Pages deploy (main branch only) ────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [demo]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download demo dist
        uses: actions/download-artifact@v4
        with:
          name: signer-web-dist
          path: dist

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }}"